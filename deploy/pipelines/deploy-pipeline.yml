
parameters:
- name: items_in_scope
  displayName: Enter Fabric items to be deployed
  type: string
  default: '["Notebook","DataPipeline","Lakehouse","SemanticModel","Report","VariableLibrary"]'

trigger:
  branches:
    include: 
    - main
  paths:
    include:
    - src/workspaces/DEV_DEMO_CICD/**

variables:
  - name: target_env
    value: ${{ replace(variables['Build.SourceBranch'], 'refs/heads/', '') }}
  # To fix the fabric ci-cd version
  - name: fabric_cicd_version
    value: "1.1.0"
  # This variable group is linked to Azure Key Vault and secrets contain tenant id, service principal client id, secret
  - group: fabric_cicd_group_sensitive
  # This variable group contains the workspace names based on naming convention "[branch]WorkspaceName". 
  # It also contains the gitFolder to be referenced in the python script.
  - group: fabric_cicd_group_non_sensitive


stages:
  - stage: DeployToFabric
    displayName: "Deploy to Fabric Workspace"
    jobs:
      - deployment: Deployment
        displayName: "Deploy Resources"
        environment: $(target_env)
        pool:
          name: Azure Pipelines
        strategy:
          runOnce:
            deploy:
             steps:
              # Use Python Version 3.12
              - checkout: self
              - task: UsePythonVersion@0
                inputs:
                  versionSpec: '3.12'
                  addToPath: true
                displayName: "Set up Python Environment"
              # Install Dependencies
              - script: |
                  python -m pip install --upgrade pip
                  pip install fabric-cicd==$(fabric_cicd_version)
                displayName: "Install Fabric CICD Library"

              - task: PythonScript@0
                inputs:
                  scriptSource: 'filePath'
                  scriptPath: 'deploy/scripts/debug_parameters.py'
                  arguments: '--target_env $(target_env)'
                displayName: 'Validate parameter.yml'

              - task: PythonScript@0
                inputs:
                  scriptSource: 'filePath'
                  scriptPath: 'deploy/scripts/fabric_cicd_deployment.py'
                  arguments: '--aztenantid $(spn-fabric-deploy-tenantid) --azclientid $(spn-fabric-deploy-clientid) --azspsecret $(spn-fabric-deploy-clientsecret) --items_in_scope ${{ parameters.items_in_scope }} --target_env $(target_env)'
                  #failOnStderr: true 
                displayName: 'Run deployment using fabric-cicd'